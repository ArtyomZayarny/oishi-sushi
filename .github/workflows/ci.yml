name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  actions: read

env:
  NX_IGNORE_UNSUPPORTED_TS_SETUP: 'true'

jobs:
  build-and-test:
    name: Lint, test, build, e2e
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: oishi
          POSTGRES_PASSWORD: oishi
          POSTGRES_DB: oishi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U oishi -d oishi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://oishi:oishi@localhost:5432/oishi
      JWT_SECRET: ci-only-jwt-secret-not-for-prod

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set Nx SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Migrate + seed database
        run: |
          pnpm prisma migrate deploy
          pnpm db:seed

      - name: Affected lint + test + build
        run: pnpm nx affected -t lint test build --parallel=3

      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: End-to-end tests
        run: pnpm nx e2e web-e2e --reporter=list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: dist/.playwright/apps/web-e2e/playwright-report
          retention-days: 7
