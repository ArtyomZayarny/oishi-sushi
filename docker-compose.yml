services:
  postgres:
    image: postgres:16-alpine
    container_name: oishi-postgres
    environment:
      POSTGRES_USER: oishi
      POSTGRES_PASSWORD: oishi_dev_pass
      POSTGRES_DB: oishi
    ports:
      - '5432:5432'
    volumes:
      - oishi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U oishi -d oishi']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  oishi_pgdata:
